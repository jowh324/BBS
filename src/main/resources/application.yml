
jwt:
  secret: "this-is-a-very-long-secret-key-at-least-32-bytes!!"
  access-minutes: 30
  refresh-days: 14
spring:
  application:
    name: API
  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/homecam?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8}
    username: ${DB_USER:apiuser}
    password: ${DB_PASSWORD:apipassword}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

server:
  port: ${SERVER_PORT:8080}

app:
  s3:
    bucket: koreatech-bbs-s3-bucket
    region: ap-northeast-2
    prefix: videos
    presignMinutes: 10

